name: sensor_compass
description: Offline compass, barometer and altimeter.
publish_to: "none"
version: 3.0.0+5

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_compass: ^0.8.1
  geolocator: ^14.0.2
  sensors_plus: ^7.0.0
  shared_preferences: ^2.5.3
  fl_chart: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.png

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/app_icon.png
  adaptive_icon_background: "#08121E"
  adaptive_icon_foreground: assets/app_icon.png
